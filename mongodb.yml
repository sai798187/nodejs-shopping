apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: shopping-app
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: admin
  MONGO_INITDB_ROOT_PASSWORD: password123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: shopping-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6
        ports:
        - containerPort: 27017
        envFrom:
        - secretRef:
            name: mongodb-secret
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: shopping-app
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
